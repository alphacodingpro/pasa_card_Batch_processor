databases:
  - name: psa-card-db
    plan: free

services:
  - type: web
    name: psa-backend
    env: python
    region: ohio
    plan: free
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.4
      - key: POSTGRES_URL
        fromDatabase:
          name: psa-card-db
          property: connectionString
      - key: FIRECRAWL_API_KEY
        sync: false
      - key: SERPAPI_KEY
        sync: false

  - type: web
    name: psa-frontend
    env: static
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: "frontend/dist"
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: psa-backend
          property: host
